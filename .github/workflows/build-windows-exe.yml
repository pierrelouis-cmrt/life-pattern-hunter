name: Build Windows executable

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-windows-exe
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build and publish x86 exe
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up 32-bit Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: x86

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install "setuptools<81" pyinstaller eniseboard
          python -c "import pkg_resources; import eniseboard"

      - name: Build executable
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name GameOfLife `
            --collect-all eniseboard `
            --hidden-import pkg_resources `
            --collect-all pkg_resources `
            lancer.py

      - name: Validate executable output
        shell: pwsh
        run: |
          $exePath = "dist\GameOfLife.exe"

          if (-not (Test-Path $exePath)) {
            throw "Expected executable was not created: $exePath"
          }

          $exeFiles = Get-ChildItem -Path "dist" -Filter "*.exe" -File
          if ($exeFiles.Count -ne 1) {
            throw "Expected exactly one .exe in dist, found $($exeFiles.Count)"
          }

          $size = (Get-Item $exePath).Length
          if ($size -le 0) {
            throw "Executable is empty: $exePath"
          }

      - name: Publish exe-only build branch
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "life-pattern-hunter-build"
          Remove-Item -Path $publishDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path $publishDir -ItemType Directory -Force | Out-Null

          Copy-Item -Path "dist\GameOfLife.exe" -Destination (Join-Path $publishDir "GameOfLife.exe")

          Push-Location $publishDir
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b build
          git add GameOfLife.exe
          git commit -m "Build Windows executable"
          git remote add origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/${{ github.repository }}.git"
          git push --force origin build
          Pop-Location
